name: Daily Blog Post

on:
  schedule:
    # 매일 UTC 00:00 = 한국시간 오전 9:00
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      draft:
        description: '초안으로 저장 (true) / 즉시 발행 (false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        env:
          CREDENTIALS_JSON_B64: ${{ secrets.CREDENTIALS_JSON_B64 }}
          TOKEN_JSON_B64: ${{ secrets.TOKEN_JSON_B64 }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          missing=""
          [ -z "$CREDENTIALS_JSON_B64" ] && missing="$missing CREDENTIALS_JSON_B64"
          [ -z "$TOKEN_JSON_B64" ] && missing="$missing TOKEN_JSON_B64"
          [ -z "$BLOG_ID" ] && missing="$missing BLOG_ID"
          if [ -z "$ANTHROPIC_API_KEY" ] && [ -z "$OPENAI_API_KEY" ] && [ -z "$GEMINI_API_KEY" ]; then
            missing="$missing (LLM 키 중 하나 필요)"
          fi
          if [ -n "$missing" ]; then
            echo "::error::누락된 Secrets:$missing"
            exit 1
          fi
          echo "✓ 필수 Secrets 확인 완료"

      - name: Restore Google OAuth credentials
        env:
          CREDENTIALS_JSON_B64: ${{ secrets.CREDENTIALS_JSON_B64 }}
          TOKEN_JSON_B64: ${{ secrets.TOKEN_JSON_B64 }}
        run: |
          echo "$CREDENTIALS_JSON_B64" | base64 -d > credentials.json
          echo "$TOKEN_JSON_B64" | base64 -d > token.json
          echo "credentials.json 크기: $(wc -c < credentials.json) bytes"
          echo "token.json 크기: $(wc -c < token.json) bytes"
          python -c "import json; json.load(open('credentials.json')); print('✓ credentials.json 파싱 OK')"
          python -c "import json; json.load(open('token.json')); print('✓ token.json 파싱 OK')"

      - name: Write .env
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          BLOG_ID: ${{ secrets.BLOG_ID }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'openai' }}
          BLOG_THEME: ${{ vars.BLOG_THEME || '일상 팁, 자기계발, IT/기술, 취미, 생산성' }}
          AUTO_TOPIC: ${{ vars.AUTO_TOPIC || '0' }}
          EMBED_VIDEO: ${{ vars.EMBED_VIDEO || '1' }}
        run: |
          {
            echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY"
            echo "OPENAI_API_KEY=$OPENAI_API_KEY"
            echo "GEMINI_API_KEY=$GEMINI_API_KEY"
            echo "PIXABAY_API_KEY=$PIXABAY_API_KEY"
            echo "BLOG_ID=$BLOG_ID"
            echo "LLM_PROVIDER=$LLM_PROVIDER"
            echo "BLOG_THEME=$BLOG_THEME"
            echo "AUTO_TOPIC=$AUTO_TOPIC"
            echo "EMBED_VIDEO=$EMBED_VIDEO"
          } > .env
          echo "✓ .env 작성 완료 (BLOG_ID=$BLOG_ID, LLM=$LLM_PROVIDER)"

      - name: Publish post
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: '1'
        run: |
          if [ "${{ github.event.inputs.draft }}" = "true" ]; then
            echo "🟡 초안 모드로 실행"
            python daily_post.py
          else
            echo "🟢 즉시 발행 모드로 실행"
            python daily_post.py --publish
          fi

      - name: Commit updated logs
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posted_log.txt topics.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "chore: 자동 발행 이력 업데이트 [skip ci]"
            git push
          fi

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f credentials.json token.json .env
